name: CI

# Build + typecheck gate. Runs on pull requests and on feature-branch pushes so
# breakage is caught before it reaches main. Pushes to main are intentionally
# excluded here — the deploy workflow (deploy-cloudflare.yml) already builds main
# as part of shipping it, so a separate CI build would be redundant.
on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build
